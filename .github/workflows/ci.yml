name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-scribew
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hecate-app-scribew/package-lock.json
      - run: npm ci
      - run: npx svelte-kit sync
      - run: npm run check
      - run: npm run build:lib
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: hecate-app-scribew/dist/
          retention-days: 1

  daemon:
    name: Daemon (compile + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hecate-app-scribed
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - name: Cache rebar3 deps
        uses: actions/cache@v4
        with:
          path: |
            hecate-app-scribed/_build/default/lib
            hecate-app-scribed/_build/default/plugins
          key: rebar3-${{ runner.os }}-${{ hashFiles('hecate-app-scribed/rebar.config') }}
          restore-keys: rebar3-${{ runner.os }}-
      - run: rebar3 compile
      - run: rebar3 eunit
      - run: rebar3 dialyzer

  package:
    name: Build plugin package
    needs: [frontend, daemon]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3.24"
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: hecate-app-scribed/priv/static/
      - name: Build plugin tarball
        run: bash hecate-app-scribed/scripts/package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: hecate-app-scribe-plugin
          path: hecate-app-scribed/_build/plugin/hecate-app-scribe.tar.gz
          retention-days: 7
